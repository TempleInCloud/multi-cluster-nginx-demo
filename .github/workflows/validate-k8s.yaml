name: Validate Kubernetes Manifests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 1: Validate YAML syntax
      - name: Validate YAML syntax
        run: |
          python - <<'PY'
          import os, yaml

          for root, _, files in os.walk("manifests"):
              for file in files:
                  if file.endswith((".yaml", ".yml")):
                      path = os.path.join(root, file)
                      with open(path) as f:
                          list(yaml.safe_load_all(f))
                      print(f"valid yaml: {path}")
          PY

      # Step 2: Install kubeval
      - name: Install kubeval
        run: |
          curl -sL https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz | tar xz
          sudo mv kubeval /usr/local/bin/

      # Step 3: Validate Kubernetes manifests properly
      - name: Validate Kubernetes manifests with kubeval
        run: |
          kubeval --strict --ignore-missing-schemas manifests/app/*.yaml